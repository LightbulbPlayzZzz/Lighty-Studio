<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lighty Studio</title>
    <style>
        :root { --bg: #0a0a0a; --text: #f0f0f0; --card: #161616; --border: #333; --accent: #ff00ff; }
        .light-mode { --bg: #ffffff; --text: #1a1a1a; --card: #f0f0f0; --border: #ccc; --accent: #d400d4; }
        
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; border: 10px solid; border-image: linear-gradient(45deg, #f00, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #f00) 1; box-sizing: border-box; transition: background 0.3s, color 0.3s; overflow-x: hidden; }
        .container { width: 95%; max-width: 850px; text-align: center; padding: 25px; }

        /* HEADER & LOGO ANIMATION */
        .header-box { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 20px; }
        
        .main-logo { 
            width: 80px; height: 80px; 
            border-radius: 50%; 
            background: white; 
            object-fit: cover;
            /* Initial spin on page load */
            animation: fast-spin-return 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* The Animation: Spin fast mid then back to position */
        @keyframes fast-spin-return {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(180deg); scale: 1.2; } /* Fast mid-point */
            100% { transform: rotate(360deg); scale: 1; } /* Back to position */
        }

        /* Class to trigger animation via JS */
        .animate-logo { animation: none; }
        .trigger-spin { animation: fast-spin-return 0.8s cubic-bezier(0.4, 0, 0.2, 1); }

        /* NAVIGATION TABS */
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .tab-btn { background: #222; color: white; border: 1px solid var(--border); padding: 12px 20px; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .tab-btn.active { background: #d3d3d3 !important; color: #222 !important; border-color: #bbb; }

        .content-section { display: none; background: var(--card); padding: 35px; border-radius: 20px; border: 1px solid var(--border); }
        .content-section.active { display: block; }
        
        .game-card { background: rgba(128, 128, 128, 0.05); padding: 20px; margin-bottom: 15px; border-radius: 12px; border: 1px solid var(--border); text-align: left; }
        .submit-btn { background: var(--accent); color: white; border: none; padding: 14px; cursor: pointer; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 15px; }
        input { width: 100%; padding: 14px; margin: 10px 0; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; box-sizing: border-box;}
        
        .check-row { display: flex; align-items: center; gap: 10px; margin: 10px 0; font-size: 0.9rem; justify-content: flex-start; }
        .pfp-display { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--accent); object-fit: cover; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <img id="mainLogo" src="Lighty studio.png" class="main-logo" alt="Logo">
        <h1 style="margin: 0; letter-spacing: 1px; font-weight: 800;">Lighty Studio</h1>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'news')">News</button>
        <button class="tab-btn" onclick="openTab(event, 'games')">Games</button>
        <button class="tab-btn" id="postTabHead" onclick="openTab(event, 'upload')" style="display:none;">Post Game</button>
        <button id="tab-signin" class="tab-btn" onclick="openTab(event, 'signin')">Sign In</button>
        <button id="tab-signup" class="tab-btn" onclick="openTab(event, 'signup')">Sign Up</button>
        <button id="tab-profile" class="tab-btn" style="display:none;" onclick="openTab(event, 'profile')">👤 Profile</button>
        <button id="tab-settings" class="tab-btn" style="display:none;" onclick="openTab(event, 'settings')">⚙️ Settings</button>
        <button id="tab-admin" class="tab-btn" style="display:none; border-color: gold;" onclick="openTab(event, 'admin')">👑 Admin</button>
    </div>

    <div id="userArea" style="margin-bottom: 20px;">
        <span id="welcomeUser" style="color: grey;">Guest</span>
        <button id="logoutBtn" style="display:none; background:#ff4444; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;" onclick="logout()">Logout</button>
    </div>

    <div id="news" class="content-section active">
        <h2>News Feed</h2>
        <p>The Logo now spins on every tab change.</p>
    </div>

    <div id="games" class="content-section">
        <h2>Games</h2>
        <div class="game-card"><h3>Paint V1</h3><button class="submit-btn" style="background:#00c853;">Play</button></div>
    </div>

    <div id="upload" class="content-section">
        <h2>Post Game</h2>
        <input type="text" placeholder="Title">
        <input type="text" placeholder="URL">
        <button class="submit-btn">Post</button>
    </div>

    <div id="signin" class="content-section">
        <h2>Sign In</h2>
        <input type="text" id="loginUser" placeholder="Username">
        <input type="password" id="loginPass" placeholder="Password">
        <label class="check-row"><input type="checkbox" onchange="toggleP('loginPass', this)"> Show Password</label>
        <button class="submit-btn" onclick="checkLogin()">Login</button>
    </div>

    <div id="signup" class="content-section">
        <h2>Sign Up</h2>
        <input type="text" id="regUser" placeholder="Username">
        <input type="password" id="regPass" placeholder="Password">
        <label class="check-row"><input type="checkbox" onchange="toggleP('regPass', this)"> Show Password</label>
        <label class="check-row"><input type="checkbox" id="gmailTick" onchange="document.getElementById('regEmail').style.display = this.checked ? 'block' : 'none'"> Enable Gmail?</label>
        <input type="email" id="regEmail" placeholder="Gmail" style="display:none;">
        <button class="submit-btn" style="background:#4caf50;" onclick="checkRegister()">Create</button>
    </div>

    <div id="profile" class="content-section">
        <img id="profilePfp" src="Lighty studio.png" class="pfp-display">
        <h2 id="profName"></h2>
    </div>

    <div id="settings" class="content-section">
        <h2>Settings</h2>
        <div class="game-card"><input type="file" id="pfpUpload" accept="image/*"><button class="submit-btn" onclick="savePfp()">Update PFP</button></div>
        <div class="game-card"><button class="submit-btn" style="background:#555;" onclick="toggleTheme()">Dark/Light</button></div>
        <div class="game-card"><input type="password" id="setVerifyPass" placeholder="Verify"><button class="submit-btn" style="background:#ff4444;" onclick="removeGmail()">Remove Gmail</button></div>
    </div>

    <div id="admin" class="content-section"><h2>👑 Admin</h2><div id="userList"></div></div>
</div>

<script>
    let users = JSON.parse(localStorage.getItem("allUsers")) || [];
    const ownerName = "LightbulbPlayzZzz";
    const masterPass = "LightyOwner2026";

    // FUNCTION TO RESET AND SPIN LOGO
    function spinLogo() {
        const logo = document.getElementById("mainLogo");
        logo.classList.remove("trigger-spin");
        void logo.offsetWidth; // Force reflow to allow re-trigger
        logo.classList.add("trigger-spin");
    }

    function openTab(evt, tabName) {
        spinLogo(); // SPIN ON TAB CHANGE
        document.querySelectorAll(".content-section").forEach(s => s.classList.remove("active"));
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(tabName).classList.add("active");
        if (evt) evt.currentTarget.classList.add("active");
        if (tabName === 'admin') updateAdmin();
    }

    function toggleP(id, box) { document.getElementById(id).type = box.checked ? "text" : "password"; }
    function toggleTheme() { document.body.classList.toggle("light-mode"); }

    function checkLogin() {
        const u = document.getElementById("loginUser").value.trim();
        const p = document.getElementById("loginPass").value;
        if (u === ownerName && p === masterPass) { loginSetup(u); openTab(null, 'news'); return; }
        const found = users.find(user => user.username === u && user.password === p);
        if (found) { loginSetup(u); openTab(null, 'news'); } else { alert("Fail"); }
    }

    function checkRegister() {
        const u = document.getElementById("regUser").value.trim();
        const p = document.getElementById("regPass").value;
        if (u.toLowerCase() === ownerName.toLowerCase()) return alert("Owner reserved");
        users.push({username: u, password: p, email: document.getElementById("gmailTick").checked ? document.getElementById("regEmail").value : null});
        localStorage.setItem("allUsers", JSON.stringify(users));
        loginSetup(u);
        openTab(null, 'news');
    }

    function loginSetup(user) {
        localStorage.setItem("lightyUser", user);
        document.getElementById("welcomeUser").innerText = user;
        document.getElementById("logoutBtn").style.display = "inline-block";
        document.querySelectorAll("#tab-signin, #tab-signup").forEach(b => b.style.display = "none");
        document.querySelectorAll("#tab-profile, #tab-settings, #postTabHead").forEach(b => b.style.display = "inline-block");
        if (user === ownerName) document.getElementById("tab-admin").style.display = "inline-block";
        document.getElementById("profName").innerText = user;
        document.getElementById("profilePfp").src = localStorage.getItem("pfp_" + user) || "Lighty studio.png";
    }

    function savePfp() {
        const user = localStorage.getItem("lightyUser");
        const reader = new FileReader();
        reader.onloadend = () => {
            localStorage.setItem("pfp_" + user, reader.result);
            document.getElementById("profilePfp").src = reader.result;
        };
        reader.readAsDataURL(document.getElementById("pfpUpload").files[0]);
    }

    function removeGmail() {
        const user = localStorage.getItem("lightyUser");
        const idx = users.findIndex(u => u.username === user);
        if (idx > -1) users[idx].email = null;
        localStorage.setItem("allUsers", JSON.stringify(users));
        loginSetup(user);
    }

    function updateAdmin() {
        const list = document.getElementById("userList");
        list.innerHTML = "";
        users.forEach((u) => {
            if (u.username === ownerName) return;
            const div = document.createElement("div");
            div.className = "game-card";
            div.innerHTML = `<strong>${u.username}</strong> <button style="float:right; background:red; color:white; border:none; padding:8px; border-radius:5px;" onclick="delU('${u.username}')">Delete</button>`;
            list.appendChild(div);
        });
    }

    function delU(target) {
        if (target === ownerName) return alert("Blocked");
        if (prompt("Admin Password:") === masterPass) {
            users = users.filter(u => u.username !== target);
            localStorage.setItem("allUsers", JSON.stringify(users));
            updateAdmin();
        }
    }

    function logout() { localStorage.removeItem("lightyUser"); location.reload(); }
    window.onload = () => { if (localStorage.getItem("lightyUser")) loginSetup(localStorage.getItem("lightyUser")); };
</script>
</body>
</html>
