<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lighty Studio</title>
    <style>
        :root { --bg: #0a0a0a; --nav: #1e1e1e; --text: #f0f0f0; --card: #161616; --border: #333; --accent: #ff00ff; }
        .light-mode { --bg: #ffffff; --nav: #e0e0e0; --text: #1a1a1a; --card: #f0f0f0; --border: #ccc; --accent: #d400d4; }
        
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-top: 80px; display: flex; justify-content: center; min-height: 100vh; border: 10px solid; border-image: linear-gradient(45deg, #f00, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #f00) 1; box-sizing: border-box; transition: 0.3s; overflow-x: hidden; }

        .navbar { position: fixed; top: 0; left: 0; right: 0; height: 65px; background: var(--nav); display: flex; align-items: center; padding: 0 15px; z-index: 1000; border-bottom: 2px solid var(--border); }
        .nav-left { display: flex; align-items: center; gap: 10px; margin-right: 20px; cursor: pointer; flex-shrink: 0; }
        .studio-logo { width: 45px; height: 45px; border-radius: 50%; background: white; object-fit: cover; }
        
        .tabs-container { display: flex; gap: 5px; overflow-x: auto; white-space: nowrap; flex-grow: 1; align-items: center; }
        .tab-btn, .nav-link { background: transparent; color: var(--text); border: none; padding: 10px 14px; cursor: pointer; border-radius: 5px; font-weight: bold; font-size: 0.9rem; text-decoration: none; }
        .tab-btn.active { background: #d3d3d3 !important; color: #222 !important; }

        .container { width: 95%; max-width: 800px; text-align: center; }
        .content-section { display: none; background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 40px rgba(0,0,0,0.3); margin-bottom: 50px; }
        .content-section.active { display: block; }
        
        /* Password Wrapper for Eye Icon */
        .pass-wrapper { position: relative; width: 100%; margin: 8px 0; }
        .toggle-pass { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--accent); cursor: pointer; font-size: 0.8rem; font-weight: bold; }

        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; box-sizing: border-box; }
        .submit-btn { background: var(--accent); color: white; border: none; padding: 12px; cursor: pointer; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; }
        
        .game-card { background: rgba(128, 128, 128, 0.05); padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid var(--border); text-align: left; position: relative; }
        .creator-tag { font-size: 0.8rem; color: #aaa; display: block; }
        .os-tag { font-size: 0.75rem; color: var(--accent); font-weight: bold; }
        .desc-text { font-size: 0.9rem; margin-top: 10px; display: none; color: #ccc; border-top: 1px solid var(--border); padding-top: 10px; }
        .see-more-btn { background: none; border: none; color: cyan; cursor: pointer; font-size: 0.8rem; text-decoration: underline; margin-top: 5px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left" onclick="openTab(null, 'news')">
            <img id="studioLogo" src="Lighty studio.png" class="studio-logo" alt="Logo">
            <span style="font-weight: 800; font-size: 1.1rem;">Lighty Studio</span>
        </div>
        <div class="tabs-container">
            <button class="tab-btn active" onclick="openTab(event, 'news')">News</button>
            <button class="tab-btn" onclick="openTab(event, 'games')">Games</button>
            <a href="https://www.youtube.com/@LightbulbPlayzZzz" target="_blank" class="nav-link">Support</a>
            <button id="tab-signin" class="tab-btn" onclick="openTab(event, 'signin')">Sign In</button>
            <button id="tab-signup" class="tab-btn" onclick="openTab(event, 'signup')">Join</button>
            <button id="tab-profile" class="tab-btn" style="display:none;" onclick="openTab(event, 'profile')">Profile</button>
            <button id="tab-settings" class="tab-btn" style="display:none;" onclick="openTab(event, 'settings')">Settings</button>
            <button id="tab-admin" class="tab-btn" style="display:none; color: gold;" onclick="openTab(event, 'admin')">Admin</button>
            <button id="logoutBtn" class="tab-btn" style="display:none; color: #ff4444;" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div id="news" class="content-section active">
            <h2>Activity</h2>
            <p>Security updates: Password toggles added to all forms.</p>
        </div>

        <div id="games" class="content-section">
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button class="tab-btn active" id="subtab-lib" onclick="toggleGameSub('lib')">Library</button>
                <button class="tab-btn" id="subtab-post" onclick="toggleGameSub('post')">Post Game</button>
            </div>
            <div id="game-library">
                <h2>Official Games</h2>
                <div class="game-card">
                    <strong>Paint V1</strong><br>
                    <span class="creator-tag">creator: LightbulbPlayzZzz</span>
                    <span class="os-tag">works for windows🪟</span>
                    <button class="submit-btn" style="background:#00c853;" onclick="window.open('https://drive.google.com/file/d/1IADQoPzjqIxE4V2h5iwdo5hCTIHNlMrb/view?usp=sharing', '_blank')">Download</button>
                </div>
            </div>
            <div id="game-posts" style="display: none;">
                <div id="publish-box" style="display: none; border-bottom: 2px solid var(--border); padding-bottom: 20px; margin-bottom: 20px;">
                    <input type="text" id="postTitle" placeholder="Game Title">
                    <input type="text" id="postLink" placeholder="Download Link">
                    <textarea id="postDesc" placeholder="Description"></textarea>
                    <select id="osSelect"><option value="Windows🪟">Windows🪟</option><option value="Mac🧀">Mac🧀</option></select>
                    <button class="submit-btn" onclick="addPost()">Publish</button>
                </div>
                <div id="feed"></div>
            </div>
        </div>

        <div id="signin" class="content-section">
            <h2>Sign In</h2>
            <input type="text" id="loginUser" placeholder="Username">
            <div class="pass-wrapper">
                <input type="password" id="loginPass" placeholder="Password">
                <button class="toggle-pass" onclick="togglePassVisibility('loginPass')">SHOW</button>
            </div>
            <button class="submit-btn" onclick="checkLogin()">Login</button>
            <p style="cursor:pointer; color:#888; font-size:0.8rem;" onclick="openTab(null, 'recovery')">Forgot Password?</p>
        </div>

        <div id="signup" class="content-section">
            <h2>Join</h2>
            <input type="text" id="regUser" placeholder="Username">
            <div class="pass-wrapper">
                <input type="password" id="regPass" placeholder="Password">
                <button class="toggle-pass" onclick="togglePassVisibility('regPass')">SHOW</button>
            </div>
            <button class="submit-btn" style="background:#4caf50;" onclick="checkRegister()">Create Account</button>
        </div>

        <div id="recovery" class="content-section">
            <h2>Recovery</h2>
            <input type="text" id="recUserSearch" placeholder="Username">
            <button class="submit-btn" onclick="findUserQuestion()">Find Question</button>
            <div id="recStep2" style="display:none; margin-top:20px;">
                <p id="recQuestionDisplay" style="color:gold;"></p>
                <input type="text" id="recAnswer" placeholder="Answer">
                <button class="submit-btn" onclick="recoverPassword()">Get Password</button>
            </div>
        </div>

        <div id="profile" class="content-section"><h2 id="profName"></h2></div>
        <div id="settings" class="content-section">
            <h2>Settings</h2>
            <button class="submit-btn" onclick="toggleTheme()">Theme Toggle</button>
            <h3 style="margin-top:30px;">Security Question</h3>
            <select id="setQuestion"><option>What is your pet's name?</option><option>Favorite Food?</option></select>
            <input type="text" id="setAnswer" placeholder="Answer">
            <button class="submit-btn" style="background:#2196F3;" onclick="saveRecoverySettings()">Save</button>
        </div>
    </div>

<script>
    let users = JSON.parse(localStorage.getItem("allUsers")) || [];
    const ownerName = "LightbulbPlayzZzz";
    const masterPass = "POLKA08642OZX/";

    function togglePassVisibility(id) {
        const input = document.getElementById(id);
        const btn = input.nextElementSibling;
        if (input.type === "password") {
            input.type = "text";
            btn.innerText = "HIDE";
        } else {
            input.type = "password";
            btn.innerText = "SHOW";
        }
    }

    function updateNavbar() {
        const user = localStorage.getItem("lightyUser");
        const isLoggedIn = !!user;
        document.getElementById("tab-signin").style.display = isLoggedIn ? "none" : "inline-block";
        document.getElementById("tab-signup").style.display = isLoggedIn ? "none" : "inline-block";
        document.getElementById("tab-profile").style.display = isLoggedIn ? "inline-block" : "none";
        document.getElementById("tab-settings").style.display = isLoggedIn ? "inline-block" : "none";
        document.getElementById("logoutBtn").style.display = isLoggedIn ? "inline-block" : "none";
        document.getElementById("tab-admin").style.display = (user === ownerName) ? "inline-block" : "none";
        if (isLoggedIn) document.getElementById("profName").innerText = user;
        const pubBox = document.getElementById("publish-box");
        if(pubBox) pubBox.style.display = isLoggedIn ? "block" : "none";
    }

    function openTab(evt, tabName) {
        document.querySelectorAll(".content-section").forEach(s => s.classList.remove("active"));
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(tabName).classList.add("active");
        if (evt) evt.currentTarget.classList.add("active");
        updateNavbar();
    }

    function toggleGameSub(type) {
        document.getElementById('game-library').style.display = (type === 'lib') ? 'block' : 'none';
        document.getElementById('game-posts').style.display = (type === 'post') ? 'block' : 'none';
        if(type === 'post') loadPosts();
    }

    function saveRecoverySettings() {
        const user = localStorage.getItem("lightyUser");
        const q = document.getElementById("setQuestion").value;
        const a = document.getElementById("setAnswer").value.trim().toLowerCase();
        users = users.map(u => u.username === user ? {...u, question: q, answer: a} : u);
        localStorage.setItem("allUsers", JSON.stringify(users));
        alert("Saved!");
    }

    function findUserQuestion() {
        const u = document.getElementById("recUserSearch").value.trim();
        const found = users.find(user => user.username === u);
        if(!found || !found.question) return alert("User/Question not found");
        document.getElementById("recQuestionDisplay").innerText = found.question;
        document.getElementById("recStep2").style.display = "block";
    }

    function recoverPassword() {
        const u = document.getElementById("recUserSearch").value.trim();
        const a = document.getElementById("recAnswer").value.trim().toLowerCase();
        const found = users.find(user => user.username === u);
        if(found.answer === a) alert("Password: " + found.password);
        else alert("Wrong Answer");
    }

    function checkRegister() {
        const u = document.getElementById("regUser").value.trim();
        const p = document.getElementById("regPass").value;
        if (!u || !p) return alert("Fill all");
        users.push({ username: u, password: p, question: "", answer: "" });
        localStorage.setItem("allUsers", JSON.stringify(users));
        loginSetup(u);
    }

    function checkLogin() {
        const u = document.getElementById("loginUser").value.trim();
        const p = document.getElementById("loginPass").value;
        if (u === ownerName && p === masterPass) { loginSetup(u); return; }
        const found = users.find(user => user.username === u && user.password === p);
        if (found) loginSetup(u); else alert("Failed");
    }

    function loginSetup(user) {
        localStorage.setItem("lightyUser", user);
        updateNavbar();
        openTab(null, 'news');
    }

    function addPost() {
        const user = localStorage.getItem("lightyUser");
        const title = document.getElementById("postTitle").value;
        const link = document.getElementById("postLink").value;
        const desc = document.getElementById("postDesc").value;
        if (!title || !link) return alert("Missing data");
        let posts = JSON.parse(localStorage.getItem("gamePosts")) || [];
        posts.unshift({ id: Date.now(), user, title, link, desc, os: document.getElementById("osSelect").value });
        localStorage.setItem("gamePosts", JSON.stringify(posts));
        loadPosts();
    }

    function loadPosts() {
        const feed = document.getElementById("feed");
        feed.innerHTML = "";
        let posts = JSON.parse(localStorage.getItem("gamePosts")) || [];
        posts.forEach(p => {
            const div = document.createElement("div");
            div.className = "game-card";
            div.innerHTML = `
                <strong>${p.title}</strong><br>
                <span class="creator-tag">creator: ${p.user}</span>
                <button class="submit-btn" style="background:#00c853;" onclick="window.open('${p.link}', '_blank')">Download</button>
                <button class="see-more-btn" onclick="this.nextElementSibling.style.display='block'">See More</button>
                <div class="desc-text">${p.desc}</div>
            `;
            feed.appendChild(div);
        });
    }

    function logout() { localStorage.removeItem("lightyUser"); location.reload(); }
    function toggleTheme() { document.body.classList.toggle("light-mode"); }
    window.onload = () => { updateNavbar(); loadPosts(); };
</script>
</body>
</html>
