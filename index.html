<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lighty Studio</title>
    <style>
        :root { --bg: #0a0a0a; --nav: #1e1e1e; --text: #f0f0f0; --card: #161616; --border: #333; --accent: #ff00ff; }
        .light-mode { --bg: #ffffff; --nav: #e0e0e0; --text: #1a1a1a; --card: #f0f0f0; --border: #ccc; --accent: #d400d4; }
        
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-top: 80px; display: flex; justify-content: center; min-height: 100vh; border: 10px solid; border-image: linear-gradient(45deg, #f00, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #f00) 1; box-sizing: border-box; transition: 0.3s; overflow-x: hidden; }

        .navbar { position: fixed; top: 0; left: 0; right: 0; height: 65px; background: var(--nav); display: flex; align-items: center; padding: 0 15px; z-index: 1000; border-bottom: 2px solid var(--border); }
        .nav-left { display: flex; align-items: center; gap: 10px; margin-right: 20px; cursor: pointer; flex-shrink: 0; }
        .studio-logo { width: 45px; height: 45px; border-radius: 50%; background: white; object-fit: cover; }
        
        @keyframes fast-spin {
            0% { transform: rotate(0deg); }
            40% { transform: rotate(180deg); scale: 1.3; }
            100% { transform: rotate(360deg); scale: 1; }
        }
        .trigger-spin { animation: fast-spin 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .tabs-container { display: flex; gap: 5px; overflow-x: auto; white-space: nowrap; flex-grow: 1; align-items: center; }
        .tab-btn, .nav-link { background: transparent; color: var(--text); border: none; padding: 10px 14px; cursor: pointer; border-radius: 5px; font-weight: bold; font-size: 0.9rem; text-decoration: none; }
        .tab-btn.active { background: #d3d3d3 !important; color: #222 !important; }

        .nav-user-icon { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; margin-left: 10px; display: none; flex-shrink: 0; }

        .container { width: 95%; max-width: 800px; text-align: center; }
        .content-section { display: none; background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 40px rgba(0,0,0,0.3); margin-bottom: 50px; }
        .content-section.active { display: block; }
        
        .game-card { background: rgba(128, 128, 128, 0.05); padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid var(--border); text-align: left; display: flex; justify-content: space-between; align-items: center; }
        .submit-btn { background: var(--accent); color: white; border: none; padding: 12px; cursor: pointer; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; box-sizing: border-box; }
        .pfp-profile-view { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--accent); object-fit: cover; margin: 0 auto 15px; display: block; background: #333; }
        .del-btn { background: red; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left" onclick="openTab(null, 'news')">
            <img id="studioLogo" src="Lighty studio.png" class="studio-logo trigger-spin" alt="Studio Logo">
            <span style="font-weight: 800; font-size: 1.1rem;">Lighty Studio</span>
        </div>

        <div class="tabs-container">
            <button class="tab-btn active" onclick="openTab(event, 'news')">News</button>
            <button class="tab-btn" onclick="openTab(event, 'games')">Games</button>
            <a href="https://www.youtube.com/@LightbulbPlayzZzz" target="_blank" class="nav-link">Support</a>
            <button id="tab-signin" class="tab-btn" onclick="openTab(event, 'signin')">Sign In</button>
            <button id="tab-signup" class="tab-btn" onclick="openTab(event, 'signup')">Join</button>
            <button id="tab-profile" class="tab-btn" style="display:none;" onclick="openTab(event, 'profile')">Profile</button>
            <button id="tab-settings" class="tab-btn" style="display:none;" onclick="openTab(event, 'settings')">Settings</button>
            <button id="tab-admin" class="tab-btn" style="display:none; color: gold;" onclick="openTab(event, 'admin')">Admin</button>
            <button id="logoutBtn" class="tab-btn" style="display:none; color: #ff4444;" onclick="logout()">Logout</button>
            <img id="navUserPfp" class="nav-user-icon">
        </div>
    </nav>

    <div class="container">
        <div id="news" class="content-section active">
            <h2>Activity</h2>
            <p>Admin password updated to your new key. Delete functionality is verified.</p>
        </div>

        <div id="games" class="content-section">
            <h2>Games</h2>
            <div class="game-card"><span>Paint V1</span><button class="del-btn" style="background:#00c853;">Launch</button></div>
        </div>

        <div id="signin" class="content-section">
            <h2>Sign In</h2>
            <input type="text" id="loginUser" placeholder="Username">
            <input type="password" id="loginPass" placeholder="Password">
            <button class="submit-btn" onclick="checkLogin()">Login</button>
        </div>

        <div id="signup" class="content-section">
            <h2>Join</h2>
            <input type="text" id="regUser" placeholder="Username">
            <input type="password" id="regPass" placeholder="Password">
            <button class="submit-btn" style="background:#4caf50;" onclick="checkRegister()">Create Account</button>
        </div>

        <div id="profile" class="content-section">
            <img id="profilePfp" src="Lighty studio.png" class="pfp-profile-view">
            <h2 id="profName"></h2>
        </div>

        <div id="settings" class="content-section">
            <h2>Settings</h2>
            <div class="game-card" style="display:block;">
                <h4>Update PFP</h4>
                <input type="file" id="pfpUpload" accept="image/*">
                <button class="submit-btn" onclick="savePfp()">Save</button>
            </div>
            <button class="submit-btn" style="background:#555;" onclick="toggleTheme()">Theme Toggle</button>
        </div>

        <div id="admin" class="content-section">
            <h2>👑 Admin Panel</h2>
            <div id="userList"></div>
        </div>
    </div>

<script>
    let users = JSON.parse(localStorage.getItem("allUsers")) || [];
    const ownerName = "LightbulbPlayzZzz";
    const masterPass = "POLKA08642OZX/"; // NEW PASSWORD SET

    function spinLogo() {
        const logo = document.getElementById("studioLogo");
        logo.classList.remove("trigger-spin");
        void logo.offsetWidth; 
        logo.classList.add("trigger-spin");
    }

    function openTab(evt, tabName) {
        spinLogo(); 
        document.querySelectorAll(".content-section").forEach(s => s.classList.remove("active"));
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(tabName).classList.add("active");
        if (evt) evt.currentTarget.classList.add("active");
        if (tabName === 'admin') updateAdmin();
    }

    function savePfp() {
        const user = localStorage.getItem("lightyUser");
        const file = document.getElementById("pfpUpload").files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onloadend = () => {
            localStorage.setItem("pfp_" + user, reader.result);
            document.getElementById("profilePfp").src = reader.result;
            document.getElementById("navUserPfp").src = reader.result;
            alert("PFP Updated!");
        };
        reader.readAsDataURL(file);
    }

    function checkLogin() {
        const u = document.getElementById("loginUser").value.trim();
        const p = document.getElementById("loginPass").value;
        if (u === ownerName && p === masterPass) { loginSetup(u); openTab(null, 'news'); return; }
        const found = users.find(user => user.username === u && user.password === p);
        if (found) { loginSetup(u); openTab(null, 'news'); } else { alert("Login Failed"); }
    }

    function checkRegister() {
        const u = document.getElementById("regUser").value.trim();
        const p = document.getElementById("regPass").value;
        if (u.toLowerCase() === ownerName.toLowerCase()) return alert("Username taken!");
        users.push({username: u, password: p});
        localStorage.setItem("allUsers", JSON.stringify(users));
        loginSetup(u); openTab(null, 'news');
    }

    function loginSetup(user) {
        localStorage.setItem("lightyUser", user);
        document.getElementById("tab-signin").style.display = "none";
        document.getElementById("tab-signup").style.display = "none";
        document.querySelectorAll("#tab-profile, #tab-settings, #logoutBtn").forEach(b => b.style.display = "inline-block");
        const savedPfp = localStorage.getItem("pfp_" + user);
        document.getElementById("profilePfp").src = savedPfp || "Lighty studio.png";
        const ni = document.getElementById("navUserPfp");
        ni.src = savedPfp || "Lighty studio.png"; ni.style.display = "block";
        if (user === ownerName) document.getElementById("tab-admin").style.display = "inline-block";
        document.getElementById("profName").innerText = user;
    }

    function updateAdmin() {
        const list = document.getElementById("userList");
        list.innerHTML = "";
        let currentUsers = JSON.parse(localStorage.getItem("allUsers")) || [];
        if (currentUsers.length === 0) list.innerHTML = "<p>No users registered.</p>";
        currentUsers.forEach(u => {
            const div = document.createElement("div");
            div.className = "game-card";
            div.innerHTML = `<span><strong>${u.username}</strong></span> <button class="del-btn" onclick="delU('${u.username}')">DELETE</button>`;
            list.appendChild(div);
        });
    }

    function delU(t) {
        const auth = prompt("Enter Admin Key:");
        if (auth === masterPass) {
            let currentUsers = JSON.parse(localStorage.getItem("allUsers")) || [];
            users = currentUsers.filter(u => u.username !== t);
            localStorage.setItem("allUsers", JSON.stringify(users));
            updateAdmin();
            alert(t + " has been removed.");
        } else {
            alert("Access Denied.");
        }
    }

    function logout() { localStorage.removeItem("lightyUser"); location.reload(); }
    function toggleTheme() { document.body.classList.toggle("light-mode"); }
    window.onload = () => { if (localStorage.getItem("lightyUser")) loginSetup(localStorage.getItem("lightyUser")); };
</script>
</body>
</html>
